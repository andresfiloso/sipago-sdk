name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test ESM import
        run: node --input-type=module -e "import { SipagoClient, toMinorUnits } from './dist/esm/index.js'; console.log(typeof SipagoClient, toMinorUnits(10));"

      - name: Smoke test CJS require
        run: node -e "const { SipagoClient, toMinorUnits } = require('./dist/cjs/index.js'); console.log(typeof SipagoClient, toMinorUnits(10));"

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: pnpm publish --no-git-checks
