name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test ESM import
        run: node --input-type=module -e "import { SipagoClient, toMinorUnits } from './dist/esm/index.js'; console.log(typeof SipagoClient, toMinorUnits(10));"

      - name: Smoke test CJS require
        run: node -e "const { SipagoClient, toMinorUnits } = require('./dist/cjs/index.js'); console.log(typeof SipagoClient, toMinorUnits(10));"
